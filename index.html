<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>নোটিশ বোর্ড</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Tiro+Bangla&display=swap" rel="stylesheet" />
  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // ✅ এখানে আপনার Firebase config বসান
    const firebaseConfig = {
      apiKey: "AIzaSyAnEXrxmLAmsKh6ktCXW7FOo_-zOdY8TdE",
      authDomain: "fyp-king-notice.firebaseapp.com",
      projectId: "fyp-king-notice",
      storageBucket: "fyp-king-notice.firebasestorage.app",
      messagingSenderId: "964120344364",
      appId: "1:964120344364:web:2189eb49ade683b60f1e89"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const board = document.getElementById("noticeBoard");
    const loader = document.getElementById("loader");
    const emptyState = document.getElementById("emptyState");

    const q = query(collection(db, "notices"), orderBy("createdAt", "desc"));

    onSnapshot(q, (snapshot) => {
      loader.style.display = "none";
      board.innerHTML = "";

      if (snapshot.empty) {
        emptyState.style.display = "flex";
        return;
      }

      emptyState.style.display = "none";
      snapshot.forEach((doc) => {
        const data = doc.data();
        board.appendChild(createCard(data));
      });
    });

    function createCard(data) {
      const card = document.createElement("div");
      card.className = `notice-card type-${data.type}`;

      const date = data.createdAt?.toDate?.() ?? new Date();
      const dateStr = date.toLocaleDateString("bn-BD", { day: "numeric", month: "long", year: "numeric" });
      const timeStr = date.toLocaleTimeString("bn-BD", { hour: "2-digit", minute: "2-digit" });

      let icon = "📌";
      if (data.type === "file") icon = "📎";
      if (data.type === "link") icon = "🔗";
      if (data.type === "urgent") icon = "🚨";
      if (data.type === "event") icon = "📅";

      let actionHTML = "";
      if (data.type === "file" && data.fileUrl) {
        actionHTML = `<a href="${data.fileUrl}" target="_blank" class="card-action" download>
          <span>ডাউনলোড করুন</span> <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </a>`;
      } else if (data.type === "link" && data.linkUrl) {
        actionHTML = `<a href="${data.linkUrl}" target="_blank" class="card-action">
          <span>লিঙ্ক খুলুন</span> <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>`;
      }

      card.innerHTML = `
        <div class="card-header">
          <span class="card-icon">${icon}</span>
          <span class="card-badge type-${data.type}">${getTypeName(data.type)}</span>
          ${data.pinned ? '<span class="card-pinned">📌 পিন করা</span>' : ""}
        </div>
        <h3 class="card-title">${escapeHtml(data.title)}</h3>
        ${data.body ? `<p class="card-body">${escapeHtml(data.body).replace(/\n/g, "<br>")}</p>` : ""}
        ${data.type === "link" && data.linkUrl ? `<div class="card-link-preview">${escapeHtml(data.linkUrl)}</div>` : ""}
        ${data.type === "file" && data.fileName ? `<div class="card-file-info"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> ${escapeHtml(data.fileName)}</div>` : ""}
        <div class="card-footer">
          <span class="card-date">${dateStr} · ${timeStr}</span>
          ${actionHTML}
        </div>
      `;

      return card;
    }

    function getTypeName(type) {
      const names = { text: "নোটিশ", file: "ফাইল", link: "লিঙ্ক", urgent: "জরুরি", event: "ইভেন্ট" };
      return names[type] || "নোটিশ";
    }

    function escapeHtml(str = "") {
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }
  </script>
</head>
<body>
  <header class="site-header">
    <div class="header-bg"></div>
    <div class="header-content">
      <div class="header-top">
        <div class="logo">
          <div class="logo-icon">📋</div>
          <div>
            <h1 class="site-title">নোটিশ বোর্ড</h1>
            <p class="site-subtitle">সব আপডেট এক জায়গায়</p>
          </div>
        </div>
        <div class="live-badge">
          <span class="live-dot"></span>
          <span>লাইভ</span>
        </div>
      </div>
      <div class="filter-bar">
        <button class="filter-btn active" onclick="filterCards('all', this)">সব</button>
        <button class="filter-btn" onclick="filterCards('text', this)">📌 নোটিশ</button>
        <button class="filter-btn" onclick="filterCards('file', this)">📎 ফাইল</button>
        <button class="filter-btn" onclick="filterCards('link', this)">🔗 লিঙ্ক</button>
        <button class="filter-btn" onclick="filterCards('urgent', this)">🚨 জরুরি</button>
        <button class="filter-btn" onclick="filterCards('event', this)">📅 ইভেন্ট</button>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div id="loader" class="loader">
      <div class="spinner"></div>
      <p>লোড হচ্ছে...</p>
    </div>

    <div id="emptyState" class="empty-state" style="display:none;">
      <div class="empty-icon">📭</div>
      <h3>এখনো কোনো নোটিশ নেই</h3>
      <p>অ্যাডমিন নোটিশ পোস্ট করলে এখানে দেখা যাবে</p>
    </div>

    <div id="noticeBoard" class="notice-board"></div>
  </main>

  <footer class="site-footer">
    <p>© ২০২৪ নোটিশ বোর্ড · <a href="admin/">অ্যাডমিন প্যানেল</a></p>
  </footer>

  <script>
    function filterCards(type, btn) {
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      document.querySelectorAll(".notice-card").forEach(card => {
        if (type === "all" || card.classList.contains(`type-${type}`)) {
          card.style.display = "";
        } else {
          card.style.display = "none";
        }
      });
    }
  </script>
</body>
</html>
