<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Admin – FYP King Notice</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root{
    --bg:#0a0c12;--card:#111420;--card2:#161b28;--card3:#1c2235;
    --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
    --text:#f0f2ff;--text2:#8b92b3;--text3:#4a5070;
    --blue:#4f8ef7;--purple:#8b5cf6;--green:#22d3a5;
    --red:#f7604f;--orange:#f7a94f;--yellow:#f7d44f;
    --font:'Hind Siliguri',sans-serif;
    --r:14px;--rs:9px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
  body::before{
    content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(ellipse 70% 50% at 5% 10%,rgba(79,142,247,0.07) 0%,transparent 60%),
      radial-gradient(ellipse 50% 40% at 95% 90%,rgba(139,92,246,0.06) 0%,transparent 60%);
  }

  /* ── Login ── */
  .login-wrap{
    position:fixed;inset:0;z-index:200;
    background:rgba(10,12,18,0.97);
    display:flex;align-items:center;justify-content:center;padding:20px;
  }
  .login-box{
    background:var(--card);border:1px solid var(--border2);
    border-radius:20px;padding:40px 32px;width:100%;max-width:400px;
    text-align:center;box-shadow:0 24px 60px rgba(0,0,0,0.7);
    animation:fadeUp .4s ease;
  }
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
  .login-logo{
    width:56px;height:56px;background:linear-gradient(135deg,var(--blue),var(--purple));
    border-radius:16px;display:flex;align-items:center;justify-content:center;
    font-size:1.5rem;margin:0 auto 20px;box-shadow:0 6px 20px rgba(79,142,247,.3);
  }
  .login-box h2{font-size:1.4rem;font-weight:700;margin-bottom:6px}
  .login-box p{font-size:0.85rem;color:var(--text2);margin-bottom:28px}
  .err{color:var(--red);font-size:0.82rem;margin-bottom:12px;min-height:18px}

  /* ── Admin layout ── */
  .admin-wrap{position:relative;z-index:1;display:none}
  .top-bar{
    background:rgba(17,20,32,0.9);backdrop-filter:blur(16px);
    border-bottom:1px solid var(--border);
    position:sticky;top:0;z-index:50;
  }
  .top-inner{
    max-width:1000px;margin:0 auto;padding:14px 20px;
    display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
  }
  .top-logo{display:flex;align-items:center;gap:10px}
  .top-logo .ico{
    width:38px;height:38px;background:linear-gradient(135deg,var(--blue),var(--purple));
    border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;
  }
  .top-logo h1{font-size:1rem;font-weight:700}
  .top-logo p{font-size:0.72rem;color:var(--text3)}
  .top-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

  /* ── Content ── */
  .content{max-width:1000px;margin:0 auto;padding:28px 20px;display:flex;flex-direction:column;gap:22px}

  /* ── Card ── */
  .panel{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:26px}
  .panel-title{
    font-size:1rem;font-weight:700;margin-bottom:20px;
    padding-bottom:14px;border-bottom:1px solid var(--border);
    display:flex;align-items:center;gap:10px;
  }

  /* ── Type tabs ── */
  .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
  .tab{
    background:var(--card2);border:1px solid var(--border);
    color:var(--text2);padding:8px 18px;border-radius:20px;
    cursor:pointer;font-family:var(--font);font-size:0.83rem;
    transition:all .2s;user-select:none;
  }
  .tab:hover{border-color:var(--border2);color:var(--text)}
  .tab.on{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:700}

  /* ── Form ── */
  .fg{margin-bottom:16px}
  .fl{display:block;font-size:0.82rem;color:var(--text2);margin-bottom:7px;font-weight:600}
  .fi,.ft{
    width:100%;background:var(--card2);border:1px solid var(--border);
    color:var(--text);padding:11px 15px;border-radius:var(--rs);
    font-family:var(--font);font-size:0.92rem;outline:none;
    transition:border-color .2s,box-shadow .2s;display:block;
  }
  .fi:focus,.ft:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(79,142,247,.1)}
  .ft{resize:vertical;min-height:100px;line-height:1.65}
  .fi::placeholder,.ft::placeholder{color:var(--text3)}

  /* File drop zone */
  .drop-zone{
    border:2px dashed var(--border2);border-radius:var(--rs);
    padding:28px 20px;text-align:center;cursor:pointer;
    transition:all .2s;background:var(--card2);
  }
  .drop-zone:hover,.drop-zone.drag{border-color:var(--blue);background:rgba(79,142,247,.05)}
  .drop-zone input{display:none}
  .drop-zone .dz-ico{font-size:2rem;margin-bottom:8px}
  .drop-zone p{font-size:0.85rem;color:var(--text2)}
  .drop-zone small{font-size:0.75rem;color:var(--text3)}
  .file-preview{
    display:flex;align-items:center;gap:10px;
    background:rgba(247,169,79,.08);border:1px solid rgba(247,169,79,.2);
    border-radius:var(--rs);padding:10px 14px;margin-top:10px;
  }
  .file-preview .fn{font-size:0.85rem;color:var(--orange);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .file-preview .fs{font-size:0.75rem;color:var(--text3)}
  .file-clear{background:none;border:none;color:var(--text3);cursor:pointer;font-size:1rem;padding:2px 6px;border-radius:4px;transition:color .15s}
  .file-clear:hover{color:var(--red)}

  /* Progress */
  .progress-bar{
    height:4px;background:var(--border);border-radius:4px;
    overflow:hidden;margin-top:8px;display:none;
  }
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));transition:width .3s}

  /* Checkbox */
  .fchk{display:flex;align-items:center;gap:10px;cursor:pointer;font-size:0.88rem;color:var(--text2);margin-bottom:18px}
  .fchk input{cursor:pointer;accent-color:var(--blue);width:16px;height:16px}

  /* Buttons */
  .btn{
    border:none;cursor:pointer;font-family:var(--font);
    border-radius:var(--rs);font-weight:700;transition:all .2s;
    display:inline-flex;align-items:center;gap:7px;
  }
  .btn-primary{background:var(--blue);color:#fff;padding:13px 28px;font-size:0.95rem;width:100%}
  .btn-primary:hover:not(:disabled){background:#3a7ef5;transform:translateY(-1px);box-shadow:0 6px 20px rgba(79,142,247,.3)}
  .btn-primary:disabled{opacity:.55;cursor:not-allowed}
  .btn-sm{background:var(--card2);border:1px solid var(--border);color:var(--text2);padding:7px 14px;font-size:0.8rem}
  .btn-sm:hover{border-color:var(--border2);color:var(--text)}
  .btn-danger{background:rgba(247,96,79,.1);border:1px solid rgba(247,96,79,.25);color:var(--red);padding:7px 14px;font-size:0.8rem}
  .btn-danger:hover{background:rgba(247,96,79,.2)}
  .btn-pin{background:rgba(247,212,79,.08);border:1px solid rgba(247,212,79,.2);color:var(--yellow);padding:7px 14px;font-size:0.8rem}
  .btn-pin.active{background:rgba(247,212,79,.18);border-color:rgba(247,212,79,.4)}

  /* Status */
  .status{font-size:0.83rem;margin-bottom:12px;min-height:20px;text-align:center;padding:8px;border-radius:8px;display:none}
  .status.show{display:block}
  .status.ok{background:rgba(34,211,165,.1);color:var(--green);border:1px solid rgba(34,211,165,.2)}
  .status.err{background:rgba(247,96,79,.1);color:var(--red);border:1px solid rgba(247,96,79,.2)}
  .status.loading{background:rgba(79,142,247,.1);color:var(--blue);border:1px solid rgba(79,142,247,.2)}

  /* Notice list */
  .notice-list{display:flex;flex-direction:column;gap:10px}
  .ni{
    background:var(--card2);border:1px solid var(--border);
    border-radius:12px;padding:14px 16px;
    display:flex;align-items:flex-start;justify-content:space-between;gap:12px;
    transition:border-color .2s;
  }
  .ni:hover{border-color:var(--border2)}
  .ni-left{display:flex;align-items:flex-start;gap:10px;flex:1;min-width:0}
  .ni-badge{font-size:0.68rem;font-weight:700;padding:3px 9px;border-radius:8px;white-space:nowrap;flex-shrink:0;margin-top:2px}
  .ni-badge.t-text{background:rgba(79,142,247,.15);color:var(--blue)}
  .ni-badge.t-file{background:rgba(247,169,79,.15);color:var(--orange)}
  .ni-badge.t-link{background:rgba(139,92,246,.15);color:var(--purple)}
  .ni-badge.t-urgent{background:rgba(247,96,79,.15);color:var(--red)}
  .ni-badge.t-event{background:rgba(34,211,165,.15);color:var(--green)}
  .ni-info{flex:1;min-width:0}
  .ni-title{font-size:0.88rem;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ni-meta{font-size:0.72rem;color:var(--text3);margin-top:3px}
  .ni-actions{display:flex;gap:7px;flex-shrink:0;flex-wrap:wrap}

  /* Stats cards */
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:0}
  .stat-card{
    background:var(--card2);border:1px solid var(--border);
    border-radius:12px;padding:16px;text-align:center;
  }
  .stat-num{font-size:1.6rem;font-weight:700;line-height:1}
  .stat-lbl{font-size:0.75rem;color:var(--text3);margin-top:6px}
  .empty-list{text-align:center;padding:36px;color:var(--text3);font-size:0.87rem}

  /* Responsive */
  @media(max-width:640px){
    .panel{padding:18px}
    .ni-actions{flex-direction:column;gap:5px}
    .ni-actions .btn{font-size:0.75rem;padding:6px 10px}
    .top-inner{padding:10px 16px}
    .content{padding:18px 14px}
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-logo">⚙️</div>
    <h2>অ্যাডমিন লগইন</h2>
    <p>নোটিশ বোর্ড পরিচালনা করুন</p>
    <div class="fg"><input class="fi" id="lemail" type="email" placeholder="ইমেইল"/></div>
    <div class="fg"><input class="fi" id="lpass" type="password" placeholder="পাসওয়ার্ড" onkeydown="if(event.key==='Enter')login()"/></div>
    <div class="err" id="lerr"></div>
    <button class="btn btn-primary" onclick="login()">লগইন করুন →</button>
  </div>
</div>

<!-- ADMIN PANEL -->
<div class="admin-wrap" id="adminWrap">
  <nav class="top-bar">
    <div class="top-inner">
      <div class="top-logo">
        <div class="ico">⚙️</div>
        <div><h1>অ্যাডমিন প্যানেল</h1><p id="userEmail">লোড হচ্ছে...</p></div>
      </div>
      <div class="top-actions">
        <a href="../" class="btn btn-sm" target="_blank">🏠 বোর্ড দেখুন</a>
        <button class="btn btn-sm" onclick="logout()">লগআউট</button>
      </div>
    </div>
  </nav>

  <div class="content">

    <!-- Stats -->
    <div class="panel" id="statsPanel" style="display:none">
      <div class="stats-grid" id="statsGrid"></div>
    </div>

    <!-- Post form -->
    <div class="panel">
      <div class="panel-title">✍️ নতুন নোটিশ পোস্ট করুন</div>

      <div class="tabs">
        <div class="tab on" data-t="text" onclick="setType('text',this)">📌 নোটিশ</div>
        <div class="tab" data-t="file" onclick="setType('file',this)">📎 ফাইল</div>
        <div class="tab" data-t="link" onclick="setType('link',this)">🔗 লিঙ্ক</div>
        <div class="tab" data-t="urgent" onclick="setType('urgent',this)">🚨 জরুরি</div>
        <div class="tab" data-t="event" onclick="setType('event',this)">📅 ইভেন্ট</div>
      </div>
      <input type="hidden" id="selType" value="text"/>

      <div class="fg">
        <label class="fl">শিরোনাম *</label>
        <input class="fi" id="nTitle" placeholder="নোটিশের শিরোনাম লিখুন"/>
      </div>
      <div class="fg">
        <label class="fl">বিবরণ (ঐচ্ছিক)</label>
        <textarea class="ft" id="nBody" rows="4" placeholder="বিস্তারিত লিখুন..."></textarea>
      </div>

      <!-- File section -->
      <div id="secFile" style="display:none" class="fg">
        <label class="fl">ফাইল <small style="color:var(--text3)">(সর্বোচ্চ ৭৫০KB – Firestore সীমা)</small></label>
        <label class="drop-zone" id="dropZone">
          <input type="file" id="fileIn" onchange="onFileChange(this)"/>
          <div class="dz-ico">📂</div>
          <p>ক্লিক করে ফাইল বেছে নিন</p>
          <small>PDF, ছবি, Word — ৭৫০KB এর মধ্যে</small>
        </label>
        <div class="file-preview" id="fprev" style="display:none">
          <span>📎</span>
          <span class="fn" id="fname"></span>
          <span class="fs" id="fsize"></span>
          <button class="file-clear" onclick="clearFile()" title="সরিয়ে দিন">✕</button>
        </div>
        <div class="progress-bar" id="pbar"><div class="progress-fill" id="pfill" style="width:0%"></div></div>
      </div>

      <!-- Link section -->
      <div id="secLink" style="display:none" class="fg">
        <label class="fl">লিঙ্ক URL</label>
        <input class="fi" id="nLink" type="url" placeholder="https://example.com"/>
      </div>

      <label class="fchk"><input type="checkbox" id="nPin"/> 📌 উপরে পিন করুন</label>

      <div class="status" id="postStatus"></div>
      <button class="btn btn-primary" id="postBtn" onclick="postNotice()">পোস্ট করুন →</button>
    </div>

    <!-- Notice list -->
    <div class="panel">
      <div class="panel-title">📋 সব নোটিশ <span id="listCount" style="font-size:.8rem;color:var(--text3);font-weight:400"></span></div>
      <div class="notice-list" id="noticeList"><p class="empty-list">লোড হচ্ছে...</p></div>
    </div>

  </div>
</div>

<!-- Firebase -->
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,collection,addDoc,deleteDoc,updateDoc,doc,onSnapshot,query,orderBy,serverTimestamp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import{getAuth,signInWithEmailAndPassword,signOut,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// ✅ আপনার Firebase config এখানে বসান
const firebaseConfig = {
  apiKey: "AIzaSyAnEXrxmLAmsKh6ktCXW7FOo_-zOdY8TdE",
  authDomain: "fyp-king-notice.firebaseapp.com",
  databaseURL: "https://fyp-king-notice-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "fyp-king-notice",
  storageBucket: "fyp-king-notice.firebasestorage.app",
  messagingSenderId: "964120344364",
  appId: "1:964120344364:web:2189eb49ade683b60f1e89",
  measurementId: "G-7GYGQSDJV7"
};

const app=initializeApp(cfg);
const db=getFirestore(app);
const auth=getAuth(app);

// Auth
onAuthStateChanged(auth,user=>{
  if(user){
    document.getElementById("loginWrap").style.display="none";
    document.getElementById("adminWrap").style.display="block";
    document.getElementById("userEmail").textContent=user.email;
    startListening();
  }else{
    document.getElementById("loginWrap").style.display="flex";
    document.getElementById("adminWrap").style.display="none";
  }
});

window.login=async()=>{
  const e=document.getElementById("lemail").value;
  const p=document.getElementById("lpass").value;
  const errEl=document.getElementById("lerr");
  errEl.textContent="";
  try{await signInWithEmailAndPassword(auth,e,p);}
  catch{errEl.textContent="ভুল ইমেইল বা পাসওয়ার্ড।";}
};

window.logout=async()=>{await signOut(auth);};

// Realtime list
function startListening(){
  const q=query(collection(db,"notices"),orderBy("createdAt","desc"));
  onSnapshot(q,snap=>{
    const notices=[];
    snap.forEach(d=>notices.push({id:d.id,...d.data()}));
    renderList(notices);
    renderStats(notices);
  });
}

function renderStats(notices){
  const panel=document.getElementById("statsPanel");
  const grid=document.getElementById("statsGrid");
  if(!notices.length){panel.style.display="none";return;}
  panel.style.display="block";
  const counts={all:notices.length,text:0,file:0,link:0,urgent:0,event:0,pinned:0};
  notices.forEach(n=>{counts[n.type]=(counts[n.type]||0)+1;if(n.pinned)counts.pinned++;});
  const items=[
    {label:"মোট নোটিশ",val:counts.all,color:"var(--blue)"},
    {label:"📌 নোটিশ",val:counts.text,color:"var(--blue)"},
    {label:"📎 ফাইল",val:counts.file,color:"var(--orange)"},
    {label:"🔗 লিঙ্ক",val:counts.link,color:"var(--purple)"},
    {label:"🚨 জরুরি",val:counts.urgent,color:"var(--red)"},
    {label:"📅 ইভেন্ট",val:counts.event,color:"var(--green)"},
    {label:"📌 পিন করা",val:counts.pinned,color:"var(--yellow)"},
  ];
  grid.innerHTML=items.filter(i=>i.val>0).map(i=>`
    <div class="stat-card">
      <div class="stat-num" style="color:${i.color}">${i.val}</div>
      <div class="stat-lbl">${i.label}</div>
    </div>
  `).join("");
}

function renderList(notices){
  const list=document.getElementById("noticeList");
  const count=document.getElementById("listCount");
  count.textContent=notices.length?`(${notices.length}টি)`:"";
  if(!notices.length){list.innerHTML='<p class="empty-list">কোনো নোটিশ নেই।</p>';return;}
  const esc=s=>(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const tNames={text:"নোটিশ",file:"ফাইল",link:"লিঙ্ক",urgent:"জরুরি",event:"ইভেন্ট"};
  list.innerHTML=notices.map(n=>{
    const date=n.createdAt?.toDate?.()??new Date();
    const dateStr=date.toLocaleString("bn-BD");
    return`<div class="ni">
      <div class="ni-left">
        <span class="ni-badge t-${n.type}">${tNames[n.type]||n.type}</span>
        <div class="ni-info">
          <div class="ni-title">${esc(n.title)}${n.pinned?' 📌':''}</div>
          <div class="ni-meta">${dateStr}${n.fileName?' · '+esc(n.fileName):''}${n.linkUrl?' · '+esc(n.linkUrl.slice(0,40))+'…':''}</div>
        </div>
      </div>
      <div class="ni-actions">
        <button class="btn btn-pin${n.pinned?' active':''}" onclick="togglePin('${n.id}',${!n.pinned})">${n.pinned?'আনপিন':'পিন'}</button>
        <button class="btn btn-danger" onclick="delNotice('${n.id}')">🗑 মুছুন</button>
      </div>
    </div>`;
  }).join("");
}

// Post notice
window.postNotice=async function(){
  const type=document.getElementById("selType").value;
  const title=document.getElementById("nTitle").value.trim();
  const body=document.getElementById("nBody").value.trim();
  const pinned=document.getElementById("nPin").checked;
  const st=document.getElementById("postStatus");
  const btn=document.getElementById("postBtn");

  const setStatus=(msg,cls)=>{st.textContent=msg;st.className="status show "+cls;}
  if(!title){setStatus("শিরোনাম দিন।","err");return;}

  btn.disabled=true;
  setStatus("পোস্ট হচ্ছে...","loading");

  try{
    let extra={};
    if(type==="file"){
      const file=document.getElementById("fileIn").files[0];
      if(!file){setStatus("ফাইল সিলেক্ট করুন।","err");btn.disabled=false;return;}
      if(file.size>750*1024){setStatus("ফাইল ৭৫০KB এর বেশি হতে পারবে না।","err");btn.disabled=false;return;}
      // Convert to base64
      const b64=await new Promise((res,rej)=>{
        const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(file);
      });
      extra={fileName:file.name,fileData:b64,fileType:file.type};
    }
    if(type==="link"){
      const url=document.getElementById("nLink").value.trim();
      if(!url){setStatus("লিঙ্ক দিন।","err");btn.disabled=false;return;}
      extra={linkUrl:url};
    }

    await addDoc(collection(db,"notices"),{type,title,body,pinned,...extra,createdAt:serverTimestamp()});
    setStatus("✅ পোস্ট হয়েছে!","ok");
    // Reset
    document.getElementById("nTitle").value="";
    document.getElementById("nBody").value="";
    document.getElementById("nLink").value="";
    document.getElementById("nPin").checked=false;
    clearFile();
    setTimeout(()=>{st.className="status";},3000);
  }catch(e){setStatus("ত্রুটি: "+e.message,"err");}
  btn.disabled=false;
};

window.delNotice=async function(id){
  if(!confirm("এই নোটিশ মুছে ফেলবেন?"))return;
  await deleteDoc(doc(db,"notices",id));
};

window.togglePin=async function(id,pinned){
  await updateDoc(doc(db,"notices",id),{pinned});
};
</script>

<script>
function setType(type,el){
  document.getElementById("selType").value=type;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("on"));
  el.classList.add("on");
  document.getElementById("secFile").style.display=type==="file"?"block":"none";
  document.getElementById("secLink").style.display=type==="link"?"block":"none";
}

function onFileChange(inp){
  const file=inp.files[0];if(!file)return;
  document.getElementById("fname").textContent=file.name;
  document.getElementById("fsize").textContent=formatBytes(file.size);
  document.getElementById("fprev").style.display="flex";
  if(file.size>750*1024){
    document.getElementById("fsize").style.color="var(--red)";
    document.getElementById("fsize").textContent+=" ⚠ অনেক বড়!";
  }else{
    document.getElementById("fsize").style.color="";
  }
}

function clearFile(){
  document.getElementById("fileIn").value="";
  document.getElementById("fprev").style.display="none";
  document.getElementById("fname").textContent="";
  document.getElementById("fsize").textContent="";
}

function formatBytes(b){
  if(b<1024)return b+"B";
  if(b<1024*1024)return(b/1024).toFixed(1)+"KB";
  return(b/1024/1024).toFixed(1)+"MB";
}

// Drag & drop
const dz=document.getElementById("dropZone");
if(dz){
  dz.addEventListener("dragover",e=>{e.preventDefault();dz.classList.add("drag")});
  dz.addEventListener("dragleave",()=>dz.classList.remove("drag"));
  dz.addEventListener("drop",e=>{
    e.preventDefault();dz.classList.remove("drag");
    const f=e.dataTransfer.files[0];
    if(f){document.getElementById("fileIn").files;
      const dt=new DataTransfer();dt.items.add(f);
      document.getElementById("fileIn").files=dt.files;
      onFileChange(document.getElementById("fileIn"));
    }
  });
}
</script>

</html>
